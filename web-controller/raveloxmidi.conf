# raveloxmidi configuration — YeeSite lighting controller
# iOS sees this session under: Settings → MIDI Network Session

# Listen on all interfaces
network.bind_address = 0.0.0.0

# RTP-MIDI ports (iOS default: 5004 data, 5005 control)
network.data.port = 5004
network.control.port = 5005

# Session name as shown on iOS
service.name = YeeSiteLights

# ALSA sequencer port name (python-rtmidi searches for this substring)
alsa.output_port = raveloxmidi

# mDNS/Bonjour announcement so iOS auto-discovers us
mdns.enable = yes

# Keep-alive interval (seconds) to prevent iOS from timing out
network.keep_alive.interval = 30

# Allow up to 4 iOS clients simultaneously
max_connections = 4

logging.level = WARN
